<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    Firma corporativa — UGC Colombia
    Compatible con: Gmail (web), Apple Mail, Outlook (con limitaciones)
    Instrucciones de instalación en Gmail:
      1. Ajustes > Ver todos los ajustes > General > Firma > Crear nueva
      2. Pegar el contenido del <body> directamente en el editor de firma
         (usar vista HTML si el cliente lo permite)
      3. Guardar cambios

    NOTA: Los estilos inline son obligatorios — los clientes de email
    eliminan <style> y <head>. Este archivo ya usa inline styles para
    máxima compatibilidad.
  -->
</head>
<body style="margin:0;padding:0;background:#ffffff;font-family:'Inter',Arial,sans-serif;">

<!-- ============================================================
     FIRMA UGC COLOMBIA — Pegar desde aquí en Gmail
     ============================================================ -->

<table
  cellpadding="0"
  cellspacing="0"
  border="0"
  style="max-width:520px;width:100%;font-family:Arial,Helvetica,sans-serif;border-collapse:collapse;"
>

  <!-- Línea superior dorada -->
  <tr>
    <td colspan="3" style="padding:0;height:2px;background-color:#FFD60A;"></td>
  </tr>

  <!-- Espacio interior -->
  <tr>
    <td colspan="3" style="height:16px;background-color:#0A0A0A;"></td>
  </tr>

  <!-- Fila principal: Logo + Separador + Info -->
  <tr>
    <td
      style="
        background-color:#0A0A0A;
        padding:0 20px 0 20px;
        vertical-align:middle;
        width:80px;
      "
    >
      <!-- Logo: texto simulado con tipografía inline (compatible email) -->
      <!-- Si tienes el logo PNG hospedado, reemplaza este bloque por <img> -->
      <table cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td style="padding:0;">
            <!-- Isotipo simulado con texto -->
            <div style="
              width:52px;
              height:52px;
              background-color:#0A0A0A;
              border:2px solid #FFD60A;
              border-radius:2px;
              text-align:center;
              line-height:52px;
              font-family:Arial,sans-serif;
              font-size:22px;
              font-weight:900;
              color:#FFD60A;
              letter-spacing:-1px;
            ">U</div>
          </td>
        </tr>
        <tr>
          <td style="padding-top:6px;text-align:center;">
            <span style="
              font-family:Arial,Helvetica,sans-serif;
              font-size:7px;
              font-weight:700;
              color:#FFD60A;
              letter-spacing:2px;
              text-transform:uppercase;
              display:block;
            ">UGC</span>
            <span style="
              font-family:Arial,Helvetica,sans-serif;
              font-size:5px;
              font-weight:400;
              color:#737373;
              letter-spacing:1.5px;
              text-transform:uppercase;
              display:block;
              margin-top:1px;
            ">COLOMBIA</span>
          </td>
        </tr>
      </table>
    </td>

    <!-- Separador vertical dorado -->
    <td style="
      background-color:#0A0A0A;
      padding:0 16px;
      vertical-align:middle;
    ">
      <div style="width:1px;height:72px;background-color:#FFD60A;"></div>
    </td>

    <!-- Información de la persona -->
    <td style="background-color:#0A0A0A;padding:0 20px 0 0;vertical-align:middle;">

      <!-- Nombre -->
      <p style="
        margin:0 0 2px 0;
        font-family:Arial,Helvetica,sans-serif;
        font-size:15px;
        font-weight:700;
        color:#FFFFFF;
        letter-spacing:0.01em;
        line-height:1.2;
      ">Alexander Cast</p>

      <!-- Cargo -->
      <p style="
        margin:0 0 8px 0;
        font-family:Arial,Helvetica,sans-serif;
        font-size:11px;
        font-weight:400;
        color:#FFD60A;
        letter-spacing:0.08em;
        text-transform:uppercase;
        line-height:1.3;
      ">CEO &amp; Estrategia · UGC Colombia</p>

      <!-- Links -->
      <table cellpadding="0" cellspacing="0" border="0">
        <tr>
          <!-- Email -->
          <td style="padding-right:12px;vertical-align:middle;">
            <a href="mailto:founder@kreoon.com" style="
              font-family:Arial,Helvetica,sans-serif;
              font-size:11px;
              color:#9CA3AF;
              text-decoration:none;
              line-height:1.4;
            ">founder@kreoon.com</a>
          </td>
          <!-- Punto separador -->
          <td style="padding-right:12px;color:#333333;font-size:11px;vertical-align:middle;">·</td>
          <!-- Web -->
          <td style="vertical-align:middle;">
            <a href="https://ugccolombia.co" style="
              font-family:Arial,Helvetica,sans-serif;
              font-size:11px;
              color:#9CA3AF;
              text-decoration:none;
              line-height:1.4;
            ">ugccolombia.co</a>
          </td>
        </tr>
        <tr>
          <td colspan="3" style="padding-top:4px;">
            <!-- Instagram -->
            <a href="https://instagram.com/agenciaugccolombia" style="
              font-family:Arial,Helvetica,sans-serif;
              font-size:11px;
              color:#737373;
              text-decoration:none;
            ">@agenciaugccolombia</a>
            <span style="color:#333333;font-size:11px;margin:0 8px;">·</span>
            <!-- TikTok -->
            <a href="https://tiktok.com/@agenciaugccolombia" style="
              font-family:Arial,Helvetica,sans-serif;
              font-size:11px;
              color:#737373;
              text-decoration:none;
            ">TikTok @agenciaugccolombia</a>
          </td>
        </tr>
      </table>

    </td>
  </tr>

  <!-- Espacio inferior -->
  <tr>
    <td colspan="3" style="height:14px;background-color:#0A0A0A;"></td>
  </tr>

  <!-- Tagline / separador inferior -->
  <tr>
    <td colspan="3" style="background-color:#111111;padding:8px 20px;">
      <p style="
        margin:0;
        font-family:Arial,Helvetica,sans-serif;
        font-size:10px;
        color:#4D4D4D;
        letter-spacing:0.06em;
        font-style:italic;
      ">UGC latino con estándar USA.</p>
    </td>
  </tr>

  <!-- Línea inferior dorada -->
  <tr>
    <td colspan="3" style="padding:0;height:1px;background-color:#FFD60A;opacity:0.4;"></td>
  </tr>

</table>

<!-- ============================================================
     FIN DE FIRMA — Hasta aquí pegar en Gmail
     ============================================================ -->

<!-- ============================================================
     VARIANTE: Firma compacta (reply/thread — sin logo)
     ============================================================ -->

<table
  cellpadding="0"
  cellspacing="0"
  border="0"
  style="max-width:400px;width:100%;font-family:Arial,Helvetica,sans-serif;border-collapse:collapse;margin-top:48px;"
>
  <tr>
    <td colspan="3" style="height:1px;background-color:#333333;"></td>
  </tr>
  <tr>
    <td style="padding:10px 0 4px 0;">
      <p style="margin:0;font-family:Arial,sans-serif;font-size:13px;font-weight:700;color:#1A1A1A;">Alexander Cast</p>
      <p style="margin:2px 0 0 0;font-family:Arial,sans-serif;font-size:11px;color:#4D4D4D;">CEO · UGC Colombia
        <span style="margin:0 6px;color:#9CA3AF;">|</span>
        <a href="mailto:founder@kreoon.com" style="color:#4D4D4D;text-decoration:none;">founder@kreoon.com</a>
        <span style="margin:0 6px;color:#9CA3AF;">|</span>
        <a href="https://ugccolombia.co" style="color:#4D4D4D;text-decoration:none;">ugccolombia.co</a>
      </p>
    </td>
  </tr>
</table>

<!-- Nota de uso: La firma compacta se usa en respuestas dentro de un hilo existente.
     La firma principal se usa solo en el primer email de un thread. -->

</body>
</html>
